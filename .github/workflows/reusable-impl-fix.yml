name: Reusable - Claude Impl Fix

on:
  workflow_call:
    secrets:
      CLAUDE_IMPL_APP_ID:
        required: true
      CLAUDE_IMPL_PRIVATE_KEY:
        required: true
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

concurrency:
  group: claude-impl-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  impl-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # 実装 Claude 自身のレビューやコメントでループしないようにガード
    if: |
      github.event.sender.type != 'Bot' ||
      !contains(github.event.sender.login, 'claude-impl')
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Generate App token (impl)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_IMPL_APP_ID }}
          private-key: ${{ secrets.CLAUDE_IMPL_PRIVATE_KEY }}

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      # TODO: 以下を 1 ジョブで完結させる
      # 1. 全レビューコメント + 未対応テーブル + 過去対応履歴を読む
      # 2. 修正コミット push
      # 3. PR description の未対応テーブル更新
      # 4. PR コメントで「対応完了レポート」投稿(<!-- claude:impl-done --> マーカー必須)
      - name: Run Claude (impl-fix)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "TODO: anthropics/claude-code-action 呼び出し"
          echo "PR: ${{ github.event.pull_request.number }}"
          # 実装時は以下のような呼び出しに置き換える:
          # - uses: anthropics/claude-code-action@v1
          #   with:
          #     claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          #     github_token: ${{ steps.app-token.outputs.token }}
          # system prompt: .github/claude/system-impl.md を読む
