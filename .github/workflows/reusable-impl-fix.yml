# レビュー指摘を受けて実装 Claude が修正する reusable workflow
# push と「対応完了レポート」コメント投稿を 1 ジョブで完結させる(切断防止)
# 認証: CLAUDE_IMPL App + CLAUDE_CODE_OAUTH_TOKEN(Claude Max プラン枠)

name: Reusable - Claude Impl Fix

on:
  workflow_call:
    inputs:
      prompts_ref:
        description: 'claude-automation から system prompt を取得する ref(default: v1)'
        required: false
        default: 'v1'
        type: string
    secrets:
      CLAUDE_IMPL_APP_ID:
        required: true
      CLAUDE_IMPL_PRIVATE_KEY:
        required: true
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

concurrency:
  group: claude-impl-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  impl-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Generate App token (impl)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_IMPL_APP_ID }}
          private-key: ${{ secrets.CLAUDE_IMPL_PRIVATE_KEY }}

      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Configure git identity (impl bot)
        run: |
          git config user.name "claude-automation-impl[bot]"
          git config user.email "${{ secrets.CLAUDE_IMPL_APP_ID }}+claude-automation-impl[bot]@users.noreply.github.com"

      # system prompt は利用者リポジトリにはないため claude-automation から curl で取得する。
      # claude-automation は public のため認証不要。prompts_ref は default v1。
      - name: Fetch system prompt from claude-automation
        env:
          PROMPTS_REF: ${{ inputs.prompts_ref }}
        run: |
          curl -fsSL "https://raw.githubusercontent.com/win2cot/claude-automation/${PROMPTS_REF}/.github/claude/system-impl.md" \
            -o /tmp/system-impl.md
          test -s /tmp/system-impl.md || { echo "ERROR: system prompt not fetched or empty"; exit 1; }

      - name: Build full prompt
        id: prompt
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
        run: |
          {
            echo 'PROMPT<<CLAUDE_PROMPT_EOF'
            echo "# Context"
            echo ""
            echo "- Target: PR #${PR_NUMBER}"
            echo "- PR head ref: ${PR_HEAD_REF}"
            echo "- Event: ${EVENT_NAME}"
            echo "- Repository: ${REPO}"
            echo "- 既に PR head ref に checkout 済み。bot identity 設定済み。"
            echo ""
            echo "# Mode detection"
            echo ""
            echo "もし docs/specs/ が存在しなければ **軽量モード** で動作する。"
            echo "軽量モードでは規約読込を skip し、レビュー指摘の対応のみに集中する。"
            echo "不要なファイル探索でターンを消費しない。"
            echo ""
            echo "# Instructions (system prompt)"
            echo ""
            cat /tmp/system-impl.md
            echo ""
            echo "# 実行手順(必ずこの順で 1 ジョブ完結)"
            echo ""
            echo "1. PR の全レビューコメント取得: gh pr view ${PR_NUMBER} --json reviews,comments,body"
            echo "2. 過去の対応完了レポート(コメント本文に signal: claude-impl-done を含むもの)を確認"
            echo "3. PR description 内の「未対応レビュー」テーブルを読む"
            echo "4. 未対応または新規の指摘を特定し、各々について対応するか見送るかを判断"
            echo "5. 修正を実施(Write / Edit ツール使用)"
            echo "6. git add -A && git commit -m '<conventional commit message>'"
            echo "7. git push origin ${PR_HEAD_REF}"
            echo "8. PR description を更新(未対応テーブル最新化)。heredoc でファイル化して --body-file 経由で渡す(SM-11、シェルクォートによる markdown 崩壊回避):"
            echo "     cat > /tmp/pr-body.md <<'PR_BODY_EOF'"
            echo "     <更新後 PR description 全文(未対応テーブル最新化済)>"
            echo "     PR_BODY_EOF"
            echo "     gh pr edit ${PR_NUMBER} --body-file /tmp/pr-body.md"
            echo "**(分岐)完遂か停止かを判断**: 全指摘に対応できたなら手順 9(完了)へ。対応不能なら手順 9B(停止)へ。"
            echo "9. [完遂時] 対応完了レポートを --body-file 経由で投稿:"
            echo "     printf '%s\\n' '<レポート本文>' '<sub>signal: claude-impl-done</sub>' > /tmp/report.md"
            echo "     gh pr comment ${PR_NUMBER} --body-file /tmp/report.md"
            echo "9B. [停止時] label 付与 + 対応不能レポートを --body-file 経由で投稿(push は行わない):"
            echo "     gh pr edit ${PR_NUMBER} --add-label needs-human-decision"
            echo "     printf '%s\\n' '<対応不能レポート本文>' '<sub>signal: claude-impl-blocked</sub>' > /tmp/blocked-report.md"
            echo "     gh pr comment ${PR_NUMBER} --body-file /tmp/blocked-report.md"
            echo ""
            echo "# 対応完了レポートのテンプレート(--body-file で渡す中身)"
            echo ""
            echo "## 対応完了レポート"
            echo ""
            echo "### 対応サマリ"
            echo "| 指摘 | 内容 | 対応 | コミット |"
            echo "|---|---|---|---|"
            echo "| (review コメントへのリンク) | (要約) | closed: <対応> または declined: <理由> | (SHA) |"
            echo ""
            echo "### 未対応テーブルの更新"
            echo "PR description の未対応テーブルを上記に合わせて更新済みです。"
            echo ""
            echo "<sub>signal: claude-impl-done</sub>"
            echo ""
            echo "# 対応不能レポートのテンプレート(--body-file で渡す中身)"
            echo ""
            echo "## 対応不能レポート"
            echo ""
            echo "### 停止理由"
            echo "(カテゴリ A: 設計分岐 / カテゴリ B: 障壁検知 のどちらかを明記し、詳細を記述)"
            echo ""
            echo "### 試みた対応"
            echo "(実施したこと、何が起きたか)"
            echo ""
            echo "### 人への依頼事項"
            echo "(win2cot に何を判断・対応してほしいか)"
            echo ""
            echo "<sub>signal: claude-impl-blocked</sub>"
            echo ""
            echo "# 停止時(カテゴリ A 設計分岐 / カテゴリ B 障壁検知)"
            echo ""
            echo "カテゴリ A(設計分岐): ADR/規約に無い設計判断、破壊的 API 変更、本番影響大、スコープ拡大"
            echo "カテゴリ B(障壁検知): 指摘に対応しようとして完遂できない(保護ファイル restore、整合性崩れ、原因不明の失敗等)"
            echo "→ label 付与: gh pr edit ${PR_NUMBER} --add-label needs-human-decision"
            echo "→ 対応不能レポート投稿(claude-impl-blocked マーカー): gh pr comment ${PR_NUMBER} --body-file /tmp/blocked-report.md"
            echo "→ push しない"
            echo ""
            echo "# 禁止事項"
            echo ""
            echo "- main への直 push"
            echo "- 自分自身の PR を approve"
            echo "- 規約 / ADR の新規創出(Issue 合意済みのみ可)"
            echo "- 完遂時は claude-impl-done、停止時は claude-impl-blocked のマーカー省略を禁止。両者を同一コメントに含めるのも禁止"
            echo 'CLAUDE_PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      # ===== SM-14c: claude 実行前の PR head SHA を捕捉 =====
      # 終了時の head SHA と比較して「run 中に新 commit が push されたか」を判定。
      # signal 不在でも新 commit + non-draft なら false positive を抑止して Done 扱い。
      - name: Capture PR head SHA before claude run
        id: pre_head
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          PRE_SHA=$(gh pr view "${PR_NUMBER}" --repo "${REPO}" \
            --json headRefOid -q '.headRefOid' 2>/dev/null || echo "")
          echo "Pre-claude PR head SHA: ${PRE_SHA}"
          echo "pre_head_sha=${PRE_SHA}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run Claude Code Action (impl-fix)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          prompt: ${{ steps.prompt.outputs.PROMPT }}
          allowed_bots: "claude-automation-impl,claude-automation-review"
          allowed_non_write_users: "claude-automation-impl,claude-automation-review"
          claude_args: |
            --max-turns ${{ vars.CLAUDE_MAX_TURNS_IMPL_FIX || 50 }}
            --allowedTools "Bash(git checkout:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git config:*),Bash(gh pr view:*),Bash(gh pr edit:*),Bash(gh pr comment:*),Bash(gh pr list:*),Bash(gh pr diff:*),Bash(gh api:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(ls:*),Bash(cat:*),Bash(find:*),Bash(grep:*),Bash(test:*),Bash(mkdir:*),Bash(touch:*),Bash(echo:*),Bash(printf:*),Bash(./gradlew:*),Read,Write,Edit,Glob,Grep"

      # ===== SM-15: 実行ログ収集(append-only, 副作用ゼロ)=====
      - name: Detect run state for runs-log
        id: state
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          CLAUDE_OUTCOME: ${{ steps.claude.outcome }}
          PRE_HEAD_SHA: ${{ steps.pre_head.outputs.pre_head_sha }}
        run: |
          set +e
          STATE="Impl-Fix-Aborted"
          REASON="unknown"

          COMMENTS=$(gh pr view "${PR_NUMBER}" --repo "${REPO}" \
            --json comments -q '.comments[].body' 2>/dev/null || echo "")

          # ===== SM-14c: PR 状態実態確認(signal 不在時の false positive 抑止)=====
          # impl-fix の成功シグナル = run 中に PR head に新 commit が積まれた
          # + non-draft 維持。draft 復帰時は state 遷移を起こさず防御 default に戻る
          POST_SHA=$(gh pr view "${PR_NUMBER}" --repo "${REPO}" \
            --json headRefOid -q '.headRefOid' 2>/dev/null || echo "")
          IS_DRAFT=$(gh pr view "${PR_NUMBER}" --repo "${REPO}" \
            --json isDraft -q '.isDraft' 2>/dev/null || echo "true")
          PR_HAS_NEW_COMMIT="false"
          if [ -n "${PRE_HEAD_SHA}" ] && [ -n "${POST_SHA}" ] \
             && [ "${PRE_HEAD_SHA}" != "${POST_SHA}" ]; then
            PR_HAS_NEW_COMMIT="true"
            echo "PR head SHA changed: ${PRE_HEAD_SHA} -> ${POST_SHA}"
          else
            echo "PR head SHA unchanged: ${PRE_HEAD_SHA}"
          fi

          # ===== SM-08b: signal + 新 commit AND 化 =====
          # 過去 run が PR に残した signal を当該 run の signal として誤検知し、
          # SM-08 step が直近の CHANGES_REQUESTED review を機械 dismiss して
          # 連動フローが沈黙停止する不具合(PR #269 Run 68 観察由来、Issue #86)
          # を抑止する。当該 run 中に新 commit が積まれた場合に限り Done と認める。
          # signal は当該 run 自身が完遂時に投稿する設計(ADR-0002 §2.3)に従う。
          if echo "${COMMENTS}" | grep -q "signal: claude-impl-done" \
             && [ "${PR_HAS_NEW_COMMIT}" = "true" ]; then
            STATE="Impl-Fix-Done"
            REASON=""
          elif echo "${COMMENTS}" | grep -q "signal: claude-impl-blocked"; then
            STATE="Impl-Fix-Blocked"
            REASON=""
          elif [ "${PR_HAS_NEW_COMMIT}" = "true" ] && [ "${IS_DRAFT}" = "false" ]; then
            # SM-14c: signal 不在だが新 commit 追加 + non-draft → false positive を回避
            STATE="Impl-Fix-Done"
            REASON="signal-missing"
          elif [ "${CLAUDE_OUTCOME}" = "cancelled" ]; then
            REASON="cancelled"
          fi

          echo "state=${STATE}" >> "$GITHUB_OUTPUT"
          echo "reason=${REASON}" >> "$GITHUB_OUTPUT"
          exit 0

      # ===== SM-08: requested_changes 自動 dismiss(Impl-Fix-Done 限定)=====
      # state が Impl-Fix-Done(= signal: claude-impl-done 投稿済)の時のみ、
      # 同 PR の active な CHANGES_REQUESTED review を全件 dismiss する。
      # 「active」の判定は GitHub の review semantics(同一 reviewer の最新 review
      # のみが mergeability に影響)に従い、reviewer ごとの最新 review が
      # CHANGES_REQUESTED のもの全部を対象にする(ADR-0002 §2.4 表)。
      # 失敗時は ::warning:: で workflow log に残すのみ、`needs-human-decision`
      # は付与しない(re-review で上書きされるため非クリティカル、ADR-0002 §2.6)。
      # SM-08b belt-and-suspenders: signal-missing(SM-14c 救済経路)は signal 不在の
      # まま新 commit + non-draft のみで Done とした弱信頼ケースのため、本 dismiss は
      # 抑止する。明示 signal を伴う Done のみが review dismiss の対象。
      - name: Dismiss stale requested_changes reviews (SM-08)
        if: always() && steps.state.outputs.state == 'Impl-Fix-Done'
            && steps.state.outputs.reason != 'signal-missing'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          DONE_SHA: ${{ github.sha }}
        run: |
          set +e
          REVIEWS=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}/reviews" --paginate 2>&1)
          RC=$?
          if [ $RC -ne 0 ]; then
            echo "::warning::SM-08: review 一覧取得失敗 (exit ${RC}): ${REVIEWS}"
            exit 0
          fi

          TARGETS=$(echo "${REVIEWS}" | jq -r '
            group_by(.user.login)
            | map(max_by(.submitted_at))
            | map(select(.state == "CHANGES_REQUESTED"))
            | .[].id
          ' 2>/dev/null)

          if [ -z "${TARGETS}" ]; then
            echo "SM-08: active な CHANGES_REQUESTED なし、dismiss 不要"
            exit 0
          fi

          MESSAGE="impl-fix で対応完了 (signal: claude-impl-done 投稿、commit ${DONE_SHA})"
          FAILED=0
          for REVIEW_ID in ${TARGETS}; do
            echo "SM-08: dismiss review ${REVIEW_ID}"
            OUT=$(gh api -X PUT \
              "/repos/${REPO}/pulls/${PR_NUMBER}/reviews/${REVIEW_ID}/dismissals" \
              -f message="${MESSAGE}" 2>&1)
            RC=$?
            if [ ${RC} -ne 0 ]; then
              echo "::warning::SM-08: dismiss 失敗 review ${REVIEW_ID} (exit ${RC}): ${OUT}"
              FAILED=$((FAILED + 1))
            fi
          done

          if [ ${FAILED} -gt 0 ]; then
            echo "::warning::SM-08: ${FAILED} 件の dismiss が失敗。re-review で上書きされるため非クリティカル、人手介入は呼ばない"
          fi
          exit 0

      # ===== SM-14: Aborted 後処理(needs-human-decision 付与 + コメント通知)=====
      # state が *-Aborted を含む時のみ実行(composite 内にも同じ check あり、
      # defense-in-depth)。cross-repo 配信のため absolute path で composite を参照
      # ([[reference-reusable-workflow-uses]])。
      - name: Cleanup aborted run
        if: always() && contains(steps.state.outputs.state, 'Aborted')
        uses: win2cot/claude-automation/.github/actions/cleanup-aborted@v1
        with:
          workflow: impl-fix
          target_type: pr
          target_number: ${{ github.event.pull_request.number }}
          target_repo: ${{ github.repository }}
          state: ${{ steps.state.outputs.state }}
          reason: ${{ steps.state.outputs.reason }}
          bot_login: 'claude-automation-impl[bot]'
          app_token: ${{ steps.app-token.outputs.token }}

      - name: Append run record to runs-log
        if: always()
        uses: win2cot/claude-automation/.github/actions/runs-log-append@v1
        with:
          workflow: impl-fix
          state: ${{ steps.state.outputs.state }}
          target_type: pr
          target_number: ${{ github.event.pull_request.number }}
          target_repo: ${{ github.repository }}
          reason: ${{ steps.state.outputs.reason }}
          branch_created: 'false'
          pr_created: 'false'
          app_token: ${{ steps.app-token.outputs.token }}
          runs_log_issue: ${{ vars.RUNS_LOG_ISSUE }}
