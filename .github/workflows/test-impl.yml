# claude-automation 内で reusable-impl.yml を発火させるテスト用 workflow
# lab 内でループガード対策や workflow 動作確認に使う

name: Test - Claude Impl (lab)

on:
  issues:
    types: [labeled]

# reusable workflow が要求する権限を呼び出し側でも明示(GitHub Actions の仕様)
permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  impl:
    if: github.event.label.name == 'claude:ready'
    uses: ./.github/workflows/reusable-impl.yml
    secrets: inherit
