# claude-automation 内で reusable-notify-human.yml を発火させるテスト用 workflow

name: Test - Notify Human (lab)

on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

# reusable workflow が要求する権限を呼び出し側でも明示(GitHub Actions の仕様)
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  notify:
    if: github.event.label.name == 'needs-human-decision'
    uses: ./.github/workflows/reusable-notify-human.yml
    secrets: inherit
    with:
      mention: '@win2cot'
