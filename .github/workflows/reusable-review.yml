# レビュワ Claude が PR を初回レビュー / 再レビューする reusable workflow
# 認証: CLAUDE_REVIEW App + CLAUDE_CODE_OAUTH_TOKEN(Claude Max プラン枠)
# 起動条件は利用者側 workflow で if 制御(例は下記コメント参照)
#
# 起動例(利用者側 / 本リポの test-review.yml も同様):
#   on:
#     pull_request:
#       types: [ready_for_review]
#     issue_comment:
#       types: [created]
#   jobs:
#     review:
#       if: |
#         github.event_name == 'pull_request' ||
#         (github.event_name == 'issue_comment' && contains(github.event.comment.body, '<!-- claude:impl-done -->'))
#       uses: win2cot/claude-automation/.github/workflows/reusable-review.yml@v1
#       secrets: inherit

name: Reusable - Claude Review

on:
  workflow_call:
    secrets:
      CLAUDE_REVIEW_APP_ID:
        required: true
      CLAUDE_REVIEW_PRIVATE_KEY:
        required: true
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # claude-code-action@v1 が要求する権限セット(actions:read は CI 結果読み取り、id-token:write は OIDC)
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Generate App token (review)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_REVIEW_APP_ID }}
          private-key: ${{ secrets.CLAUDE_REVIEW_PRIVATE_KEY }}

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.head.ref || github.event.issue.pull_request.head.ref }}
          fetch-depth: 0

      # prompt は workflow file ではなく外部ファイル + 動的組立で生成する。
      # 理由 1: workflow file の prompt 文字列を変更する PR は Anthropic 側 checksum で
      #         AI 実行ブロックされるため、workflow file 自体に prompt リテラルを書かない
      #         (ADR-0001 §2.5 R20)
      # 理由 2: --append-system-prompt に複数行を渡す claude_args 経由のやり方は
      #         シェル引数 escape が破綻しやすいため、prompt 入力に統合する
      - name: Build full prompt
        id: prompt
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
        run: |
          {
            echo 'PROMPT<<CLAUDE_PROMPT_EOF'
            echo "# Context"
            echo ""
            echo "- Target: PR/Issue #${PR_NUMBER}"
            echo "- Event: ${EVENT_NAME}"
            echo "- Repository: ${REPO}"
            echo ""
            echo "# Mode detection"
            echo ""
            echo "もし \`docs/specs/\` が存在しなければ **軽量モード** で動作する。"
            echo "軽量モードでは規約読込を skip し、5 ターン以内に approve または changes_requested で submit すること。"
            echo "不要なファイル探索でターンを消費しない。"
            echo ""
            echo "# Instructions (system prompt)"
            echo ""
            cat .github/claude/system-review.md
            echo ""
            echo "# 最終出力要件"
            echo ""
            echo "PR レビューを **必ず submit** すること(comment ではなく review として)。"
            echo "approve 条件を満たさなければ changes_requested で submit。"
            echo "CLAUDE_PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code Action (review)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          # prompt が与えられるため Automation mode で起動する
          prompt: ${{ steps.prompt.outputs.PROMPT }}
          claude_args: --max-turns 30
