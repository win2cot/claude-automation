# レビュワ Claude が PR を初回レビュー / 再レビューする reusable workflow
# 認証: CLAUDE_REVIEW App + CLAUDE_CODE_OAUTH_TOKEN(Claude Max プラン枠)
# 起動条件は利用者側 workflow で if 制御(例は下記コメント参照)
#
# 起動例(利用者側 / 本リポの test-review.yml も同様):
#   on:
#     pull_request:
#       types: [ready_for_review]
#     issue_comment:
#       types: [created]
#   jobs:
#     review:
#       if: |
#         github.event_name == 'pull_request' ||
#         (github.event_name == 'issue_comment' && contains(github.event.comment.body, '<!-- claude:impl-done -->'))
#       uses: win2cot/claude-automation/.github/workflows/reusable-review.yml@v1
#       secrets: inherit

name: Reusable - Claude Review

on:
  workflow_call:
    secrets:
      CLAUDE_REVIEW_APP_ID:
        required: true
      CLAUDE_REVIEW_PRIVATE_KEY:
        required: true
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # claude-code-action@v1 が要求する権限セット(actions:read は CI 結果読み取り、id-token:write は OIDC)
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Generate App token (review)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_REVIEW_APP_ID }}
          private-key: ${{ secrets.CLAUDE_REVIEW_PRIVATE_KEY }}

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.head.ref || github.event.issue.pull_request.head.ref }}
          fetch-depth: 0

      # system prompt は .github/claude/system-review.md を外部読み込み
      # 理由: workflow file の prompt 文字列を変更する PR は Anthropic 側 checksum で実行ブロックされるため、
      #       workflow file 自体を変えずに system prompt を更新できる構成にする(ADR-0001 §2.5 / R20)
      - name: Load review system prompt
        id: sysprompt
        run: |
          {
            echo 'SYSTEM<<CLAUDE_PROMPT_EOF'
            cat .github/claude/system-review.md
            echo 'CLAUDE_PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code Action (review)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          # prompt が与えられるため Automation mode で起動する
          prompt: |
            あなたはレビュワ Claude です。次の PR / Issue をレビューしてください。

            - Number: ${{ github.event.pull_request.number || github.event.issue.number }}
            - Event: ${{ github.event_name }}
            - Repository: ${{ github.repository }}

            重要な前提:
            - 規約が `docs/specs/` に存在しない場合、規約読込を skip して system prompt の「軽量モード」に切り替える(無いものを探し続けない)
            - ADR は `docs/adr/` に存在しても、PR の変更内容に関連するもののみ読む(全件読まない)
            - 不要なファイル探索でターンを消費しない

            必ず system prompt(append-system-prompt として注入される)に従い、観点チェックリストを出力したうえで approve または changes_requested で submit してください。
          claude_args: |
            --max-turns 30
            --append-system-prompt
            ${{ steps.sysprompt.outputs.SYSTEM }}
