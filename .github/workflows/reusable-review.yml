# レビュワ Claude が PR を初回レビュー / 再レビューする reusable workflow
# 認証: CLAUDE_REVIEW App + CLAUDE_CODE_OAUTH_TOKEN(Claude Max プラン枠)
#
# 起動例(利用者側 / 本リポの test-review.yml も同様):
#   on:
#     pull_request:
#       types: [opened, ready_for_review]
#     issue_comment:
#       types: [created]
#   jobs:
#     review:
#       if: |
#         (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
#         (github.event_name == 'issue_comment' && ...)
#       uses: win2cot/claude-automation/.github/workflows/reusable-review.yml@v1
#       secrets: inherit

name: Reusable - Claude Review

on:
  workflow_call:
    inputs:
      prompts_ref:
        description: 'claude-automation から system prompt を取得する ref(default: v1)'
        required: false
        default: 'v1'
        type: string
    secrets:
      CLAUDE_REVIEW_APP_ID:
        required: true
      CLAUDE_REVIEW_PRIVATE_KEY:
        required: true
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Generate App token (review)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_REVIEW_APP_ID }}
          private-key: ${{ secrets.CLAUDE_REVIEW_PRIVATE_KEY }}

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.head.ref || github.event.issue.pull_request.head.ref }}
          fetch-depth: 0

      # system prompt は利用者リポジトリにはないため claude-automation から curl で取得する。
      # claude-automation は public のため認証不要。prompts_ref は default v1。
      - name: Fetch system prompt from claude-automation
        env:
          PROMPTS_REF: ${{ inputs.prompts_ref }}
        run: |
          curl -fsSL "https://raw.githubusercontent.com/win2cot/claude-automation/${PROMPTS_REF}/.github/claude/system-review.md" \
            -o /tmp/system-review.md
          test -s /tmp/system-review.md || { echo "ERROR: system prompt not fetched or empty"; exit 1; }

      - name: Build full prompt
        id: prompt
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
        run: |
          {
            echo 'PROMPT<<CLAUDE_PROMPT_EOF'
            echo "# Context"
            echo ""
            echo "- Target: PR/Issue #${PR_NUMBER}"
            echo "- Event: ${EVENT_NAME}"
            echo "- Repository: ${REPO}"
            echo ""
            echo "# Mode detection"
            echo ""
            echo "もし docs/specs/ が存在しなければ **軽量モード** で動作する。"
            echo "軽量モードでは規約読込を skip し、5 ターン以内に approve または changes_requested で submit すること。"
            echo "不要なファイル探索でターンを消費しない。"
            echo ""
            echo "# Instructions (system prompt)"
            echo ""
            cat /tmp/system-review.md
            echo ""
            echo "# 最終出力要件"
            echo ""
            echo "PR レビューを必ず submit すること(comment ではなく review として)。"
            echo "approve 条件を満たすなら: gh pr review ${PR_NUMBER} --approve --body '<簡潔な所見>'"
            echo "approve 条件を満たさないなら: gh pr review ${PR_NUMBER} --request-changes --body '<指摘内容>'"
            echo "実行は Bash ツール経由で行う。他のツールで submit を試みない。"
            echo 'CLAUDE_PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code Action (review)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          prompt: ${{ steps.prompt.outputs.PROMPT }}
          allowed_bots: "claude-automation-impl,claude-automation-review"
          allowed_non_write_users: "claude-automation-impl,claude-automation-review"
          claude_args: |
            --max-turns 30
            --allowedTools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr list:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh api:*),Bash(ls:*),Bash(cat:*),Bash(find:*),Bash(grep:*),Bash(test:*),Read,Glob,Grep"
