# claude-automation 内で reusable-review.yml を発火させるテスト用 workflow

name: Test - Claude Review (lab)

on:
  pull_request:
    types: [ready_for_review]
  issue_comment:
    types: [created]

# reusable workflow の jobs.<job>.permissions は呼び出し側の permissions の subset である必要があるため、
# 呼び出し側でも reusable-review.yml と同等の権限を明示する(GitHub Actions の仕様)。
# C-2/C-3 で他の test-*.yml も同様に permissions を追加すること。
permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  review:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '<!-- claude:impl-done -->'))
    uses: ./.github/workflows/reusable-review.yml
    secrets: inherit
