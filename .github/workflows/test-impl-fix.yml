# claude-automation 内で reusable-impl-fix.yml を発火させるテスト用 workflow

name: Test - Claude Impl Fix (lab)

on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

# reusable workflow が要求する権限を呼び出し側でも明示(GitHub Actions の仕様)
permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  impl-fix:
    if: |
      (github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested') ||
      github.event_name == 'pull_request_review_comment'
    uses: ./.github/workflows/reusable-impl-fix.yml
    secrets: inherit
