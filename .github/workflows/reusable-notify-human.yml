# needs-human-decision ラベル付与時に人を呼ぶ + auto-merge を保険で無効化する reusable workflow
# 認証: CLAUDE_IMPL App(ラベル付与 / コメント投稿用、どちらの App でも可)
#
# 起動例(利用者側 / 本リポの test-notify-human.yml も同様):
#   on:
#     issues:
#       types: [labeled]
#     pull_request:
#       types: [labeled]
#   jobs:
#     notify:
#       if: github.event.label.name == 'needs-human-decision'
#       uses: win2cot/claude-automation/.github/workflows/reusable-notify-human.yml@v1
#       secrets: inherit
#       with:
#         mention: '@win2cot'

name: Reusable - Notify Human

on:
  workflow_call:
    inputs:
      mention:
        description: 'メンション先(例: @win2cot)。指定しなければ @win2cot がデフォルト'
        required: false
        default: '@win2cot'
        type: string
    secrets:
      CLAUDE_IMPL_APP_ID:
        required: true
      CLAUDE_IMPL_PRIVATE_KEY:
        required: true

concurrency:
  group: claude-notify-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # この workflow はコメント投稿(issues:write)と auto-merge 無効化(pull-requests:write)のみ。
    # contents:write は使わないので付与しない(最小権限原則)。
    # SM-25: actions:read は付けない。caller (shim) 側に actions:read がない場合
    # called workflow の job permissions が caller の上限を超えると startup_failure になる。
    # runs-log-append の gh api fallback は github.run_started_at が空のときのみ発火し、
    # issues / pull_request labeled event では常に populate されるため fallback は不要
    # (失敗時も composite 内で `2>/dev/null || echo ""` でガード済み → DURATION_MS=0 で append 継続)。
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Generate App token (impl)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_IMPL_APP_ID }}
          private-key: ${{ secrets.CLAUDE_IMPL_PRIVATE_KEY }}

      # メンションコメントを Issue または PR に投稿
      - name: Post mention comment
        id: post
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          MENTION: ${{ inputs.mention }}
        run: |
          ISSUE_OR_PR_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
          # body はシェルクォートエスケープを避けるため --body-file 経由
          BODY_FILE=$(mktemp)
          printf '%s\n\n%s\n' \
            "${MENTION} 設計分岐に直面しました。" \
            "直前の Claude コメントから理由と推奨案を確認のうえ、判断をお願いします。" \
            > "${BODY_FILE}"
          gh issue comment "${ISSUE_OR_PR_NUMBER}" \
            --repo "${{ github.repository }}" \
            --body-file "${BODY_FILE}"

      # PR の場合は保険として auto-merge を無効化(approve 後に分岐が付くケース対策)
      - name: Disable auto-merge (safety, PR only)
        if: github.event.pull_request.number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --disable-auto \
            --repo "${{ github.repository }}" || true

      # ===== SM-15: 実行ログ収集(append-only, 副作用ゼロ)=====
      - name: Detect run state for runs-log
        id: state
        if: always()
        env:
          POST_OUTCOME: ${{ steps.post.outcome }}
        run: |
          if [ "${POST_OUTCOME}" = "success" ]; then
            STATE="Notify-Posted"
            REASON=""
          else
            STATE="Notify-Failed"
            REASON="unknown"
          fi
          echo "state=${STATE}" >> "$GITHUB_OUTPUT"
          echo "reason=${REASON}" >> "$GITHUB_OUTPUT"
          # target_type 判定(issue or pr)
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            echo "target_type=pr" >> "$GITHUB_OUTPUT"
            echo "target_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "target_type=issue" >> "$GITHUB_OUTPUT"
            echo "target_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Append run record to runs-log
        if: always()
        uses: win2cot/claude-automation/.github/actions/runs-log-append@v1
        with:
          workflow: notify-human
          state: ${{ steps.state.outputs.state }}
          target_type: ${{ steps.state.outputs.target_type }}
          target_number: ${{ steps.state.outputs.target_number }}
          target_repo: ${{ github.repository }}
          reason: ${{ steps.state.outputs.reason }}
          app_token: ${{ steps.app-token.outputs.token }}
          runs_log_issue: ${{ vars.RUNS_LOG_ISSUE }}
