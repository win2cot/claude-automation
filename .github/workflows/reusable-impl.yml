# 実装 Claude が Issue を解析し、ブランチ作成 → 実装 → PR open(draft → ready)する reusable workflow
# 認証: CLAUDE_IMPL App + CLAUDE_CODE_OAUTH_TOKEN(Claude Max プラン枠)
#
# 起動例(利用者側 / 本リポの test-impl.yml も同様):
#   on:
#     issues:
#       types: [labeled]
#   jobs:
#     impl:
#       if: github.event.label.name == 'claude:ready'
#       uses: win2cot/claude-automation/.github/workflows/reusable-impl.yml@v1
#       secrets: inherit

name: Reusable - Claude Impl

on:
  workflow_call:
    inputs:
      issue_number:
        description: 'Issue 番号(省略時は github.event.issue.number を使用)'
        required: false
        type: string
      prompts_ref:
        description: 'claude-automation から system prompt を取得する ref(default: v1)'
        required: false
        default: 'v1'
        type: string
    secrets:
      CLAUDE_IMPL_APP_ID:
        required: true
      CLAUDE_IMPL_PRIVATE_KEY:
        required: true
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

concurrency:
  group: claude-impl-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  impl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Generate App token (impl)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_IMPL_APP_ID }}
          private-key: ${{ secrets.CLAUDE_IMPL_PRIVATE_KEY }}

      - name: Checkout main
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main
          fetch-depth: 0

      - name: Configure git identity (impl bot)
        run: |
          git config user.name "claude-automation-impl[bot]"
          git config user.email "${{ secrets.CLAUDE_IMPL_APP_ID }}+claude-automation-impl[bot]@users.noreply.github.com"

      # system prompt は利用者リポジトリにはないため claude-automation から curl で取得する。
      # claude-automation は public のため認証不要。prompts_ref は default v1。
      - name: Fetch system prompt from claude-automation
        env:
          PROMPTS_REF: ${{ inputs.prompts_ref }}
        run: |
          curl -fsSL "https://raw.githubusercontent.com/win2cot/claude-automation/${PROMPTS_REF}/.github/claude/system-impl.md" \
            -o /tmp/system-impl.md
          test -s /tmp/system-impl.md || { echo "ERROR: system prompt not fetched or empty"; exit 1; }

      - name: Build full prompt
        id: prompt
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
        run: |
          {
            echo 'PROMPT<<CLAUDE_PROMPT_EOF'
            echo "# Context"
            echo ""
            echo "- Target: Issue #${ISSUE_NUMBER}"
            echo "- Event: ${EVENT_NAME}"
            echo "- Repository: ${REPO}"
            echo "- Branch convention: claude/impl/issue-${ISSUE_NUMBER}-<short-description>"
            echo ""
            echo "# Mode detection"
            echo ""
            echo "もし docs/specs/ が存在しなければ **軽量モード** で動作する。"
            echo "軽量モードでは規約読込を skip し、Issue 本文の指示と既存コード/文書の自然な整合のみで実装する。"
            echo "不要なファイル探索でターンを消費しない。"
            echo ""
            echo "# Instructions (system prompt)"
            echo ""
            cat /tmp/system-impl.md
            echo ""
            echo "# 実行手順(必ずこの順で 1 ジョブ完結)"
            echo ""
            echo "1. gh issue view ${ISSUE_NUMBER} で Issue 本文を読む"
            echo "2. 実装方針を Issue にコメント投稿(着手宣言 + 方針サマリ)"
            echo "3. ブランチ作成: git checkout -b claude/impl/issue-${ISSUE_NUMBER}-<short>"
            echo "4. ファイル編集・新規作成(Write / Edit ツール使用)"
            echo "5. git add -A && git commit -m '<conventional commit message>'"
            echo "6. git push -u origin claude/impl/issue-${ISSUE_NUMBER}-<short>"
            echo "7. PR description は heredoc でファイル化して --body-file 経由で渡す(SM-11、シェルクォートによる markdown 崩壊回避):"
            echo "     cat > /tmp/pr-body.md <<'PR_BODY_EOF'"
            echo "     <PR description 本文(markdown 多行可、未対応テーブル空表を含む)>"
            echo "     PR_BODY_EOF"
            echo "     gh pr create --draft --title '<title>' --body-file /tmp/pr-body.md --label task-type:impl"
            echo "8. gh pr ready <PR番号>"
            echo ""
            echo "# 設計分岐検知時"
            echo ""
            echo "ADR/規約に無い設計判断、破壊的 API 変更、本番影響大、スコープ拡大などを検知した場合は **作業を止めて** 以下を実行する。PR は作らない。"
            echo "  gh issue edit ${ISSUE_NUMBER} --add-label needs-human-decision"
            echo "  gh issue comment ${ISSUE_NUMBER} --body '## 設計判断が必要です ... @win2cot ジャッジをお願いします'"
            echo ""
            echo "# 禁止事項"
            echo ""
            echo "- main への直 push"
            echo "- 自分自身の PR を approve"
            echo "- 規約 / ADR の新規創出(Issue 合意済みのみ可)"
            echo 'CLAUDE_PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code Action (impl)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          prompt: ${{ steps.prompt.outputs.PROMPT }}
          claude_args: |
            --max-turns ${{ vars.CLAUDE_MAX_TURNS_IMPL || 80 }}
            --allowedTools "Bash(git checkout:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git config:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh issue edit:*),Bash(gh issue list:*),Bash(gh pr create:*),Bash(gh pr edit:*),Bash(gh pr ready:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh pr list:*),Bash(gh api:*),Bash(gh label:*),Bash(ls:*),Bash(cat:*),Bash(find:*),Bash(grep:*),Bash(test:*),Bash(mkdir:*),Bash(touch:*),Bash(echo:*),Bash(./gradlew:*),Bash(docker:*),Read,Write,Edit,Glob,Grep"

      # ===== SM-15: 実行ログ収集(append-only, 副作用ゼロ)=====
      - name: Detect run state for runs-log
        id: state
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
          REPO: ${{ github.repository }}
          CLAUDE_OUTCOME: ${{ steps.claude.outcome }}
        run: |
          set +e
          STATE="Impl-Aborted"
          REASON="unknown"
          PR_CREATED="false"
          BRANCH_CREATED="false"

          COMMENTS=$(gh issue view "${ISSUE_NUMBER}" --repo "${REPO}" \
            --json comments -q '.comments[].body' 2>/dev/null || echo "")

          # ===== SM-14c: PR 実態確認(signal 不在時の false positive 抑止)=====
          # claude-impl が作る branch は "claude/impl/issue-${N}-${slug}" 規則
          # PR 特定軸 = branch prefix + bot author + same-repo の AND
          # 同一 SHA 複数 PR → 最新 number を採用、fork PR は除外、
          # merged 後 branch 自動削除に備え state=all で検索
          PR_LIST_JSON=$(gh pr list --repo "${REPO}" --state all --limit 30 \
            --json number,isDraft,state,headRefName,headRepository,author \
            2>/dev/null || echo "[]")

          # author.login は API 経由 / gh CLI 版で "[bot]" 接尾辞の有無があるので両方受ける
          PR_MATCH=$(echo "${PR_LIST_JSON}" | jq -c \
            --arg n "${ISSUE_NUMBER}" \
            --arg repo "${REPO}" '
            [.[]
              | select(.headRefName | startswith("claude/impl/issue-" + $n + "-")
                                       or . == "claude/impl/issue-" + $n)
              | select(.headRepository.nameWithOwner == $repo)
              | select(.author.login == "claude-automation-impl"
                       or .author.login == "claude-automation-impl[bot]"
                       or .author.login == "app/claude-automation-impl")
            ] | sort_by(.number) | last // empty' 2>/dev/null || echo "")

          PR_IS_DONE="false"
          if [ -n "${PR_MATCH}" ] && [ "${PR_MATCH}" != "null" ]; then
            PR_NUMBER=$(echo "${PR_MATCH}" | jq -r '.number')
            IS_DRAFT=$(echo "${PR_MATCH}" | jq -r '.isDraft')
            PR_STATE=$(echo "${PR_MATCH}" | jq -r '.state')
            echo "Found impl PR #${PR_NUMBER} (isDraft=${IS_DRAFT}, state=${PR_STATE})"
            BRANCH_CREATED="true"
            if [ "${IS_DRAFT}" = "false" ] \
               && { [ "${PR_STATE}" = "OPEN" ] || [ "${PR_STATE}" = "MERGED" ]; }; then
              PR_IS_DONE="true"
              PR_CREATED="true"
            fi
          else
            echo "No impl PR found for issue #${ISSUE_NUMBER}"
          fi

          # ===== 状態判定(signal 優先 → PR 実態 → cancelled → defensive default)=====
          if echo "${COMMENTS}" | grep -q "signal: claude-impl-done"; then
            STATE="Impl-Done"
            REASON=""
            PR_CREATED="true"
            BRANCH_CREATED="true"
          elif echo "${COMMENTS}" | grep -q "signal: claude-impl-blocked"; then
            STATE="Impl-Blocked"
            REASON=""
            BRANCH_CREATED="true"
          elif [ "${PR_IS_DONE}" = "true" ]; then
            # SM-14c: signal 不在だが PR 完遂状態 → false positive を回避
            STATE="Impl-Done"
            REASON="signal-missing"
          elif [ "${CLAUDE_OUTCOME}" = "cancelled" ]; then
            REASON="cancelled"
          fi

          echo "state=${STATE}" >> "$GITHUB_OUTPUT"
          echo "reason=${REASON}" >> "$GITHUB_OUTPUT"
          echo "branch_created=${BRANCH_CREATED}" >> "$GITHUB_OUTPUT"
          echo "pr_created=${PR_CREATED}" >> "$GITHUB_OUTPUT"
          exit 0

      # ===== SM-14: Aborted 後処理(label 整理 + 着手宣言コメント編集)=====
      # state が *-Aborted を含む時のみ実行(composite 内にも同じ check あり、
      # defense-in-depth)。cross-repo 配信のため absolute path で composite を参照
      # ([[reference-reusable-workflow-uses]])。
      - name: Cleanup aborted run
        if: always() && contains(steps.state.outputs.state, 'Aborted')
        uses: win2cot/claude-automation/.github/actions/cleanup-aborted@v1
        with:
          workflow: impl
          target_type: issue
          target_number: ${{ github.event.issue.number || inputs.issue_number }}
          target_repo: ${{ github.repository }}
          state: ${{ steps.state.outputs.state }}
          reason: ${{ steps.state.outputs.reason }}
          bot_login: 'claude-automation-impl[bot]'
          app_token: ${{ steps.app-token.outputs.token }}

      - name: Append run record to runs-log
        if: always()
        uses: win2cot/claude-automation/.github/actions/runs-log-append@v1
        with:
          workflow: impl
          state: ${{ steps.state.outputs.state }}
          target_type: issue
          target_number: ${{ github.event.issue.number || inputs.issue_number }}
          target_repo: ${{ github.repository }}
          reason: ${{ steps.state.outputs.reason }}
          branch_created: ${{ steps.state.outputs.branch_created }}
          pr_created: ${{ steps.state.outputs.pr_created }}
          app_token: ${{ steps.app-token.outputs.token }}
          runs_log_issue: ${{ vars.RUNS_LOG_ISSUE }}
