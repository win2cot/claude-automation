# SKELETON: 実装 Claude(Issue → PR 作成)を起動する reusable workflow
# 利用者リポジトリ(tasks-webapi 等)から uses: で呼ばれる
#
# 起動例(利用者側):
#   on:
#     issues:
#       types: [labeled]
#   jobs:
#     impl:
#       if: github.event.label.name == 'claude:ready'
#       uses: win2cot/claude-automation/.github/workflows/reusable-impl.yml@v1
#       secrets: inherit

name: Reusable - Claude Impl

on:
  workflow_call:
    inputs:
      issue_number:
        description: 'Issue 番号(省略時は github.event から自動取得)'
        required: false
        type: string
      task_type:
        description: 'task-type ラベル(impl / design)'
        required: false
        default: 'impl'
        type: string
    secrets:
      CLAUDE_IMPL_APP_ID:
        required: true
      CLAUDE_IMPL_PRIVATE_KEY:
        required: true
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

concurrency:
  group: claude-impl-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  impl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Generate App token (impl)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_IMPL_APP_ID }}
          private-key: ${{ secrets.CLAUDE_IMPL_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      # TODO: anthropics/claude-code-action の正式呼び出しに置き換える
      # 認証: CLAUDE_CODE_OAUTH_TOKEN(Claude Max プラン枠を消費)
      - name: Run Claude (impl)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          TASK_TYPE: ${{ inputs.task_type }}
        run: |
          echo "TODO: anthropics/claude-code-action 呼び出し"
          echo "Issue: ${{ github.event.issue.number || inputs.issue_number }}"
          echo "Task type: ${TASK_TYPE}"
          # 実装時は以下のような呼び出しに置き換える(skeleton では echo のみ):
          # - uses: anthropics/claude-code-action@v1
          #   with:
          #     claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          #     github_token: ${{ steps.app-token.outputs.token }}
          # system prompt: .github/claude/system-impl.md を読む
