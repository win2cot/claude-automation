# レビュワ Claude が approve した PR の auto-merge を有効化する reusable workflow
# 認証: CLAUDE_REVIEW App(approve した actor で auto-merge 有効化することで整合性を保つ)
#
# 起動例(利用者側 / 本リポの test-auto-merge.yml も同様):
#   on:
#     pull_request_review:
#       types: [submitted]
#   jobs:
#     auto-merge:
#       if: |
#         github.event.review.state == 'approved' &&
#         !contains(github.event.pull_request.labels.*.name, 'needs-human-decision')
#       uses: win2cot/claude-automation/.github/workflows/reusable-auto-merge.yml@v1
#       secrets: inherit

name: Reusable - Claude Auto Merge

on:
  workflow_call:
    secrets:
      CLAUDE_REVIEW_APP_ID:
        required: true
      CLAUDE_REVIEW_PRIVATE_KEY:
        required: true

concurrency:
  group: claude-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Generate App token (review)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_REVIEW_APP_ID }}
          private-key: ${{ secrets.CLAUDE_REVIEW_PRIVATE_KEY }}

      # gh pr merge --auto は「条件を満たしたら自動的に merge する」状態を有効化する。
      # 実際の merge は GitHub が approval + CI green + ブランチ保護条件を満たした時に行う。
      - name: Enable auto-merge
        id: enable
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --auto --squash \
            --repo ${{ github.repository }}

      # ===== SM-15: 実行ログ収集(append-only, 副作用ゼロ)=====
      - name: Detect run state for runs-log
        id: state
        if: always()
        env:
          ENABLE_OUTCOME: ${{ steps.enable.outcome }}
        run: |
          if [ "${ENABLE_OUTCOME}" = "success" ]; then
            STATE="Auto-Merge-Enabled"
            REASON=""
          else
            STATE="Auto-Merge-Failed"
            REASON="unknown"
          fi
          echo "state=${STATE}" >> "$GITHUB_OUTPUT"
          echo "reason=${REASON}" >> "$GITHUB_OUTPUT"

      - name: Append run record to runs-log
        if: always()
        uses: win2cot/claude-automation/.github/actions/runs-log-append@v1
        with:
          workflow: auto-merge
          state: ${{ steps.state.outputs.state }}
          target_type: pr
          target_number: ${{ github.event.pull_request.number }}
          target_repo: ${{ github.repository }}
          reason: ${{ steps.state.outputs.reason }}
          branch_created: 'false'
          pr_created: 'false'
          app_token: ${{ steps.app-token.outputs.token }}
          runs_log_issue: ${{ vars.RUNS_LOG_ISSUE }}
