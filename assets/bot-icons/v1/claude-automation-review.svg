<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#8250df"/>

  <!-- Magnifier handle -->
  <g transform="rotate(35 100 100)">
    <rect x="92" y="115" width="16" height="70" rx="6" fill="#5c2e0e" stroke="#3d1a06" stroke-width="2"/>
    <!-- Handle grip -->
    <rect x="92" y="170" width="16" height="12" rx="3" fill="#3d1a06"/>
  </g>

  <!-- Magnifier ring (outer) -->
  <circle cx="100" cy="85" r="45" fill="none" stroke="#c9d1d9" stroke-width="8"/>
  <!-- Magnifier ring (inner shadow) -->
  <circle cx="100" cy="85" r="40" fill="#ffffff" fill-opacity="0.95" stroke="#3d4248" stroke-width="2"/>
  <!-- Lens highlight -->
  <ellipse cx="86" cy="72" rx="10" ry="6" fill="#ffffff" opacity="0.6"/>

  <!-- Checkmark inside lens -->
  <path d="M 80 88 L 95 102 L 120 76" stroke="#1f883d" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
